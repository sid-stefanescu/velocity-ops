<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-lg">
<!-- TopAppBar -->
<header class="w-full top-0 border-b border-outline-variant bg-surface flex justify-between items-center px-margin-mobile py-stack-sm sticky z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">widgets</span>
<h1 class="font-headline-md text-headline-md font-bold text-primary tracking-tight uppercase">VELOCITY OPS</h1>
</div>
<div class="flex items-center gap-3">
<span class="font-label-caps text-label-caps text-on-surface-variant bg-surface-container-high px-2 py-1 rounded-sm border border-outline-variant">WH-402</span>
<div class="w-8 h-8 rounded-full bg-primary-fixed flex items-center justify-center border border-outline-variant">
<span class="material-symbols-outlined text-on-primary-fixed" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 p-margin-mobile flex flex-col gap-stack-lg max-w-md mx-auto w-full pb-32">
<!-- Screen Title -->
<div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-primary uppercase">Unloader Check-in</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-1">Select bay and enter incoming truck details.</p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-stack-lg flex-1" id="checkin-form">
<!-- Bay Number Selection (Grid of touch targets) -->
<div class="bg-surface-container-lowest p-4 rounded-lg border border-outline-variant">
<label class="block font-label-caps text-label-caps text-on-surface mb-stack-md uppercase">1. Select Bay Number</label>
<div class="grid grid-cols-3 gap-2">
<!-- Radio group implemented visually -->
<button class="bay-btn h-14 bg-surface rounded border border-outline-variant flex items-center justify-center font-data-display text-data-display text-on-surface hover:bg-surface-container-low transition-colors focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent" data-bay="71" type="button">71</button>
<button class="bay-btn h-14 bg-surface rounded border border-outline-variant flex items-center justify-center font-data-display text-data-display text-on-surface hover:bg-surface-container-low transition-colors focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent" data-bay="72" type="button">72</button>
<button class="bay-btn h-14 bg-surface rounded border border-outline-variant flex items-center justify-center font-data-display text-data-display text-on-surface hover:bg-surface-container-low transition-colors focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent" data-bay="73" type="button">73</button>
<button class="bay-btn h-14 bg-surface rounded border border-outline-variant flex items-center justify-center font-data-display text-data-display text-on-surface hover:bg-surface-container-low transition-colors focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent" data-bay="74" type="button">74</button>
<button class="bay-btn h-14 bg-surface rounded border border-outline-variant flex items-center justify-center font-data-display text-data-display text-on-surface hover:bg-surface-container-low transition-colors focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent" data-bay="75" type="button">75</button>
<button class="bay-btn h-14 bg-surface rounded border border-outline-variant flex items-center justify-center font-data-display text-data-display text-on-surface hover:bg-surface-container-low transition-colors focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent" data-bay="76" type="button">76</button>
<button class="bay-btn h-14 bg-surface rounded border border-outline-variant flex items-center justify-center font-data-display text-data-display text-on-surface hover:bg-surface-container-low transition-colors focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent" data-bay="77" type="button">77</button>
<button class="bay-btn h-14 bg-surface rounded border border-outline-variant flex items-center justify-center font-data-display text-data-display text-on-surface hover:bg-surface-container-low transition-colors focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent" data-bay="78" type="button">78</button>
<button class="bay-btn h-14 bg-surface rounded border border-outline-variant flex items-center justify-center font-data-display text-data-display text-on-surface hover:bg-surface-container-low transition-colors focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent" data-bay="79" type="button">79</button>
</div>
<input id="selected-bay" name="bay" required="" type="hidden"/>
</div>
<!-- Text Inputs -->
<div class="bg-surface-container-lowest p-4 rounded-lg border border-outline-variant flex flex-col gap-stack-md">
<div>
<label class="block font-label-caps text-label-caps text-on-surface mb-stack-sm uppercase" for="truck-number">2. Truck Number</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">local_shipping</span>
<input class="w-full h-14 pl-10 pr-4 bg-surface border border-outline-variant rounded font-body-lg text-body-lg text-on-surface placeholder:text-outline focus:ring-2 focus:ring-secondary focus:border-secondary transition-shadow uppercase" id="truck-number" name="truck-number" placeholder="e.g. TRK-8492" required="" type="text"/>
</div>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface mb-stack-sm uppercase" for="unloader-id">3. Unloader ID</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">badge</span>
<input class="w-full h-14 pl-10 pr-4 bg-surface border border-outline-variant rounded font-body-lg text-body-lg text-on-surface placeholder:text-outline focus:ring-2 focus:ring-secondary focus:border-secondary transition-shadow uppercase" id="unloader-id" name="unloader-id" placeholder="Scan or type ID" required="" type="text"/>
</div>
</div>
</div>
</form>
</main>
<!-- Fixed Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full bg-surface border-t border-outline-variant p-margin-mobile z-40 pb-safe">
<button class="w-full h-14 bg-secondary text-on-secondary font-headline-md text-headline-md rounded flex items-center justify-center gap-2 hover:bg-secondary-container hover:text-on-secondary-container transition-colors active:scale-[0.98] shadow-sm disabled:opacity-50 disabled:cursor-not-allowed" id="submit-btn" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
            START SESSION
        </button>
</div>
<script>
        // Simple interaction logic for bay selection
        const bayButtons = document.querySelectorAll('.bay-btn');
        const bayInput = document.getElementById('selected-bay');

        bayButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                // Remove active state from all
                bayButtons.forEach(b => {
                    b.classList.remove('bg-secondary-container', 'text-on-secondary-container', 'border-secondary-container');
                    b.classList.add('bg-surface', 'text-on-surface', 'border-outline-variant');
                });
                
                // Add active state to clicked
                btn.classList.remove('bg-surface', 'text-on-surface', 'border-outline-variant');
                btn.classList.add('bg-secondary-container', 'text-on-secondary-container', 'border-secondary-container');
                
                // Update hidden input
                bayInput.value = btn.dataset.bay;
            });
        });

        // Form submission simulation
        document.getElementById('submit-btn').addEventListener('click', (e) => {
            e.preventDefault();
            const bay = bayInput.value;
            const truck = document.getElementById('truck-number').value;
            const id = document.getElementById('unloader-id').value;

            if(!bay || !truck || !id) {
                alert("Please complete all fields.");
                return;
            }
            
            // Visual feedback
            const btn = e.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">sync</span> PROCESSING`;
            btn.classList.add('opacity-80');
            
            setTimeout(() => {
                btn.innerHTML = `<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span> CHECKED IN`;
                btn.classList.remove('bg-secondary', 'hover:bg-secondary-container');
                btn.classList.add('bg-[#146c2e]', 'text-white'); // using custom color for specific success state temporarily
                
                setTimeout(() => {
                    // Reset form
                    document.getElementById('checkin-form').reset();
                    bayInput.value = '';
                    bayButtons.forEach(b => {
                        b.classList.remove('bg-secondary-container', 'text-on-secondary-container', 'border-secondary-container');
                        b.classList.add('bg-surface', 'text-on-surface', 'border-outline-variant');
                    });
                    
                    // Reset button
                    btn.innerHTML = originalText;
                    btn.classList.remove('bg-[#146c2e]', 'text-white', 'opacity-80');
                    btn.classList.add('bg-secondary', 'hover:bg-secondary-container');
                }, 2000);
            }, 1000);
        });
    </script>
</body></html>
